<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css"></link>
</head>

<body>
    <template id="img-box-template">
        <style>
        .img-box-container { 
            width: 200px;
            height: 200px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        } 
        .img-box-container:hover .mask {
            opacity: 0.7;
        }
        .img-box-container:hover .info-footer {
            display: none;
        }
        .img-box-container img {
            width: 100%;
            height: 100%;
        }
        .info-footer { 
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: rgba(0,0,0,0.5);
            color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }
        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        </style>
        <div class="img-box-container">
            <img src="" alt="">
            <div class="info-footer">
                <div class="info name"></div>
                <div class="info price"></div>
            </div>
            <div class="mask">
                <slot name="icon"></slot>
            </div>

        </div>
    </template>
    <div class="container">
        <image-box url="./images/冰乌龙.jpeg" name="冰乌龙" price="19.9">
            <img src="./images/购物车.png" slot="icon" style="width: 36px;height: 36px;"></img>
        </image-box>
        <image-box url="./images/奥利奥奶茶.jpeg" name="奥利奥奶茶" price="18.8">
            <img src="./images/购物车.png" slot="icon" style="width: 36px;height: 36px;"></img>
        </image-box>
        <image-box url="./images/奥利奥蛋糕.jpeg" name="奥利奥蛋糕" price="38.8">
            <img src="./images/购物车.png" slot="icon" style="width: 36px;height: 36px;"></img>
        </image-box>
        <image-box url="./images/百香凤梨.jpeg" name="百香凤梨" price="25.8">
            <img src="./images/购物车.png" slot="icon" style="width: 36px;height: 36px;" ></img>
        </image-box>
    </div>   
</body>
<script src="./index.js"></script>
</html>
